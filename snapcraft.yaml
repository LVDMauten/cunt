name: cunt
version: stable
version-script: git -C parts/cunt/build describe --abbrev=0 --tags
summary: Glorious app which corrects your previous console command by calling it a cunt.
description: |
    Cunt tries to match a rule for the previous command,
    creates a new command using the matched rule and runs it.

grade: stable
confinement: classic

apps:
    cunt:
        command: bin/cunt
        environment:
            PYTHONIOENCODING: utf-8

parts:
    cunt:
        source: https://github.com/LVDMauten/cunt.git
        plugin: python
